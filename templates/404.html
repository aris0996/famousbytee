<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Outfit',sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; min-height:100vh; display:grid; place-items:center; padding:24px; }
        .box { max-width:640px; width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:40px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
        h1 { margin:0; font-size:4rem; line-height:1; letter-spacing:-2px; }
        p { color:rgba(255,255,255,.82); line-height:1.7; }
        a { display:inline-flex; margin-top:18px; background:#4f46e5; color:#fff; text-decoration:none; padding:12px 18px; border-radius:999px; font-weight:800; }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <h2>Halaman tidak ditemukan</h2>
        <p>Alamat yang Anda buka mungkin sudah berubah, dipindahkan, atau belum tersedia.</p>
        <a href="{{ url_for('index') }}">Kembali ke Beranda</a>
    </div>
</body>
</html>
