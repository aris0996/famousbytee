{% extends "base.html" %}
{% block content %}
<div style="height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
    <div>
        <div style="font-size: 8rem; font-weight: 900; color: var(--primary); opacity: 0.1; line-height: 1;">500</div>
        <h1 style="margin-top: -3rem;">Terjadi Kesalahan Server</h1>
        <p style="color: var(--text-muted); max-width: 500px; margin: 1.5rem auto;">Maaf, sistem mengalami gangguan teknis saat memproses permintaan Anda. Admin telah diberitahu secara otomatis.</p>
        
        <div class="card" style="margin-top: 2rem; border-left: 4px solid #ef4444; background: #fff1f2; text-align: left; padding: 1.5rem;">
            <p style="font-size: 0.8rem; font-weight: 800; color: #991b1b; margin-bottom: 10px; text-transform: uppercase;">Detail Teknis:</p>
            <code style="font-size: 0.85rem; color: #b91c1c; display: block; overflow-x: auto;">{{ error or 'Internal Server Error' }}</code>
        </div>

        <div style="margin-top: 2.5rem; display: flex; justify-content: center; gap: 15px;">
            <form action="{{ url_for('report_error') }}" method="POST">
                <input type="hidden" name="error_details" value="{{ error }}">
                <input type="hidden" name="page_url" value="{{ request.url }}">
                <button type="submit" class="btn" style="background: #ef4444;">Laporkan ke Admin</button>
            </form>
            <a href="{{ url_for('dashboard') }}" class="btn" style="background: #e2e8f0; color: #475569; text-decoration: none;">Kembali ke Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
